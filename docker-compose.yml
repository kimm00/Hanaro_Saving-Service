services:
  localdb:
    container_name: hanarodb
    image: mysql:8.0
    ports:
      - 3308:3306
    expose:
      - 3308
    environment:
      MYSQL_ROOT_PASSWORD: TestdbRoot
      MYSQL_DATABASE: hanarodb
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb_ft_min_token_size=2
      - --log_bin_trust_function_creators=1
      - --innodb_ft_server_stopword_table=hanarodb/StopWord

    volumes:
      - ./mysql:/var/lib/mysql
