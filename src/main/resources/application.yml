spring:
  application:
    name: hanaro

  config:
    import: classpath:security.yml

  jpa:
    hibernate:
      ddl-auto: create
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

    show-sql: true
    defer-datasource-initialization: true

    properties:
      hibernate:
        jdbc:
          batch_size: 50
          time_zone: Asia/Seoul
        order_inserts: true
        order_updates: true
        format_sql: true
        use_sql_comments: true

  sql:
    init:
      mode: always

  flyway:
    enabled: false
    baseline-on-migrate: true


  web:
    resources:
      add-mappings: true

  servlet:
    multipart:
      max-request-size: 10MB
      max-file-size: 2MB

  messages:
    basename: messages/message

upload:
  path: src/main/resources/static/upload
  secure: src/main/upload/secure

management:
  server:
    port: 9001
  endpoints:
    web:
      exposure:
        include: "*"
        exclude: env,beans
  endpoint:
    metrics:
      access: read_only
    shutdown:
      access: unrestricted
    health:
      show-details: always

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger.html
  api-docs:
    enabled: true
    path: /api-docs
